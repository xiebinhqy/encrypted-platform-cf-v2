# ============================================
#  🔐 Encrypted Notes v2 — Docker 自动构建
#  
#  每次 push 到 master 或 dev 分支时：
#    1. 自动构建 Docker 镜像
#    2. 推送到 GitHub Container Registry (ghcr.io)
#    3. 自动给镜像打上版本标签
#
#  使用方式：
#    拉取镜像：docker pull ghcr.io/xiebinhqy/encrypted-platform-cf-v2:latest
#
#    运行容器：
#      docker run -d -p 3000:3000 \
#        -e JWT_SECRET=你的密钥 \
#        -v notes-data:/app/backend/data \
#        ghcr.io/xiebinhqy/encrypted-platform-cf-v2:latest
# ============================================

name: Build and Push Docker Image

on:
  push:
    branches: [ master, dev ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - '*.md'
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: 检测分支并设置标签后缀
      - name: Set tag suffix based on branch
        id: branch
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "suffix=latest" >> $GITHUB_OUTPUT
          else
            echo "suffix=dev" >> $GITHUB_OUTPUT
          fi

      # Step 3: 确认关键文件存在
      - name: Verify files
        run: |
          ls -la Dockerfile
          ls -la backend/package.json
          ls -la backend/server.js

      # Step 4: 安装 QEMU（多架构构建支持）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Step 5: 安装 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: 登录 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 7: 生成镜像标签
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.branch.outputs.suffix }},enable=true
            type=sha,format=short

      # Step 8: 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUILD_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max